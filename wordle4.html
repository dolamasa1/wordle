<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Wordle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 150, 0.0004) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 150, 0.0004) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 100px;
            padding-right: 100px;
        }

        .md-system {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #ffffff;
            animation: neonGlow 2s ease-in-out infinite alternate;
            background: linear-gradient(45deg, #00ff88, #00e676);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 10px rgba(0, 255, 136, 0.8),
                0 0 20px rgba(0, 255, 136, 0.6),
                0 0 30px rgba(0, 255, 136, 0.4),
                0 0 50px rgba(0, 255, 136, 0.2);
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            text-decoration: underline;
            cursor: pointer;
            transition: text-decoration 0.2s, opacity 0.2s;
        }

        .md-system:hover, .md-system:focus {
            opacity: 0.8;
            text-decoration: underline wavy #00ff88;
        }

        .title-section {
            flex: 1;
            text-align: center;
        }

        .level-indicator {
            position: absolute;
            right: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .level-badge {
            background: rgba(0, 255, 150, 0.2);
            border: 1px solid rgba(0, 255, 150, 0.4);
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #00ff96;
            text-transform: uppercase;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 8px;
            color: white;
            padding: 6px 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .settings-btn:hover {
            background: rgba(0, 255, 150, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 150, 0.3);
        }

        @keyframes neonGlow {
            from {
                text-shadow: 
                    0 0 10px rgba(0, 255, 136, 0.8),
                    0 0 20px rgba(0, 255, 136, 0.6),
                    0 0 30px rgba(0, 255, 136, 0.4),
                    0 0 50px rgba(0, 255, 136, 0.2);
            }
            to {
                text-shadow: 
                    0 0 20px rgba(0, 255, 136, 1),
                    0 0 30px rgba(0, 255, 136, 0.8),
                    0 0 40px rgba(0, 255, 136, 0.6),
                    0 0 70px rgba(0, 255, 136, 0.4);
            }
        }

        .title {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff96, #00cc77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 150, 0.3);
            margin-bottom: 3px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }

        /* Dashboard Styles */
        .dashboard-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .dashboard-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .dashboard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 255, 150, 0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 150, 0.25);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }

        .dashboard-overlay.show .dashboard {
            transform: translate(-50%, -50%) scale(1);
        }

        .dashboard-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: #00ff96;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .level-option {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .level-option.wide {
            grid-column: 1 / -1;
        }

        .level-option:hover {
            background: rgba(0, 255, 150, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.3);
            transform: translateY(-2px);
        }

        .level-option.active {
            background: rgba(0, 255, 150, 0.2);
            border-color: #00ff96;
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.4);
        }

        .level-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .level-desc {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }

        .dashboard-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .dashboard-btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            border: none;
        }

        .dashboard-btn.primary {
            background: linear-gradient(135deg, #00ff96, #00cc77);
            color: #000;
        }

        .dashboard-btn.primary:hover {
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            transform: translateY(-2px);
        }

        .dashboard-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .dashboard-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .game-board {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 150, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0;
        }

        .grid {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 20px;
            flex-shrink: 0;
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px 0px;
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;
            position: relative;
        }

        .cell {
            width: 54px;
            height: 54px;
            max-width: 14vw;
            max-height: 14vw;
            min-width: 36px;
            min-height: 36px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .cell.correct {
            background: linear-gradient(135deg, #00ff96, #00cc77);
            border-color: #00ff96;
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            color: #000;
        }

        .cell.present {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            border-color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
            color: #000;
        }

        .cell.absent {
            background: rgba(60, 60, 60, 0.8);
            border-color: rgba(100, 100, 100, 0.5);
            color: rgba(255, 255, 255, 0.8);
        }

        .cell.flip {
            animation: flip 0.6s ease-in-out forwards;
        }

        .cell.bounce {
            animation: bounce 0.6s ease-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0); }
            50% { transform: rotateY(-90deg); }
            100% { transform: rotateY(0); }
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1.05); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes winningPulse {
            0% { 
                transform: scale(1); 
                box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            }
            50% { 
                transform: scale(1.05); 
                box-shadow: 0 0 30px rgba(0, 255, 150, 0.8);
            }
            100% { 
                transform: scale(1); 
                box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            }
        }

        .row.winning .cell.correct {
            animation: winningPulse 1s ease-in-out infinite;
        }

        /* Tooltip Styles */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #ffaa00;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            white-space: nowrap;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 170, 0, 0.4);
            pointer-events: none;
            font-weight: 500;
        }

        .tooltip.show {
            opacity: 1;
            visibility: visible;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.9);
        }

        /* Row tooltip for mobile */
        .row-tooltip {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 255, 150, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 20px;
            color: #ffaa00;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        .row.show-tooltip .row-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) translateX(5px);
        }

        .keyboard {
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;
        }

        .key {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 8px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            min-width: 35px;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }

        .key:hover {
            background: rgba(0, 255, 150, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.3);
            transform: translateY(-2px);
        }

        .key.wide {
            padding: 10px 18px;
            min-width: 70px;
        }

        .key.correct {
            background: linear-gradient(135deg, #00ff96, #00cc77) !important;
            color: #000 !important;
            border-color: #00ff96 !important;
            box-shadow: 0 0 15px rgba(0, 255, 150, 0.6) !important;
        }

        .key.present {
            background: linear-gradient(135deg, #ffaa00, #ff8800) !important;
            color: #000 !important;
            border-color: #ffaa00 !important;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.6) !important;
        }

        .key.absent {
            background: rgba(40, 40, 40, 0.9) !important;
            border-color: rgba(60, 60, 60, 0.8) !important;
            color: rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5) !important;
            cursor: default;
        }

        .key.absent:hover {
            background: rgba(40, 40, 40, 0.9) !important;
            transform: none;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5) !important;
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 150, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
            font-weight: 500;
        }

        .message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(10px);
        }

        .word-info-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .word-info-panel.show {
            opacity: 1;
            visibility: visible;
        }

        .word-info-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 255, 150, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .word-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00ff96;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .word-arabic {
            font-size: 1.8rem;
            color: #ffaa00;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .definition {
            margin-bottom: 15px;
        }

        .definition-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .definition-text {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .close-btn {
            background: linear-gradient(135deg, #00ff96, #00cc77);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            transform: translateY(-2px);
        }

        .game-stats {
            text-align: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .attempts {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 6px 0;
        }

        .new-game-btn, .give-up-btn {
            border: none;
            padding: 8px 18px;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .new-game-btn {
            background: linear-gradient(135deg, #00ff96, #00cc77);
            color: #000;
        }

        .new-game-btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
            transform: translateY(-2px);
        }

        .give-up-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }

        .give-up-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            color: white;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 4vw 2vw 2vw 2vw;
                min-height: 100vh;
                max-width: 100vw;
                box-sizing: border-box;
            }

            .header {
                padding-left: 0;
                padding-right: 0;
            }

            .md-system {
                font-size: 0.7rem;
                left: 10px;
            }

            .level-indicator {
                right: 10px;
            }

            .title {
                font-size: 1.3rem;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            .game-board {
                padding: 2vw;
                min-width: 0;
                max-width: 100vw;
                box-sizing: border-box;
            }

            .grid {
                gap: 2vw;
                margin-bottom: 3vw;
                width: 100%;
                max-width: 100vw;
            }

            .row {
                gap: 1vw 0;
                width: 100%;
                max-width: 100vw;
            }

            .cell {
                width: 12vw;
                height: 12vw;
                min-width: 32px;
                min-height: 32px;
                max-width: 14vw;
                max-height: 14vw;
                font-size: 1.1rem;
            }

            .keyboard {
                width: 100%;
                max-width: 100vw;
                margin: 0 auto;
                gap: 2vw;
                align-items: center;
                justify-content: center;
            }

            .keyboard-row {
                gap: 2vw;
                width: 100%;
                max-width: 100vw;
                justify-content: center;
            }

            .key {
                padding: 2vw 2vw;
                font-size: 0.9rem;
                min-width: 8vw;
                min-height: 8vw;
                max-width: 14vw;
                max-height: 14vw;
                box-sizing: border-box;
            }

            .key.wide {
                min-width: 16vw;
                max-width: 22vw;
            }

            .level-grid {
                grid-template-columns: 1fr;
            }

            .dashboard {
                padding: 25px 20px;
            }

            .dashboard-title {
                font-size: 1.2rem;
            }

            .tooltip {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a class="md-system" href="../index.html">MD System</a>
            <div class="title-section">
                <h1 class="title">WORDLE</h1>
                <p class="subtitle">Futuristic Word Challenge</p>
            </div>
            <div class="level-indicator">
                <div class="level-badge" id="current-level">A1-A2</div>
                <button class="settings-btn" onclick="showDashboard()">⚙</button>
            </div>
        </div>

        <div class="game-board">
            <div class="game-stats">
                <div class="attempts">Attempt: <span id="current-attempt">1</span> / 6</div>
                <div class="game-controls">
                    <button class="new-game-btn" onclick="startNewGame()">New Game</button>
                    <button class="give-up-btn" onclick="giveUp()">Give Up</button>
                </div>
            </div>

            <div class="grid" id="grid">
                <!-- Grid will be generated by JavaScript -->
            </div>

            <div class="keyboard" id="keyboard">
                <div class="keyboard-row">
                    <button class="key" onclick="handleKey('q')">Q</button>
                    <button class="key" onclick="handleKey('w')">W</button>
                    <button class="key" onclick="handleKey('e')">E</button>
                    <button class="key" onclick="handleKey('r')">R</button>
                    <button class="key" onclick="handleKey('t')">T</button>
                    <button class="key" onclick="handleKey('y')">Y</button>
                    <button class="key" onclick="handleKey('u')">U</button>
                    <button class="key" onclick="handleKey('i')">I</button>
                    <button class="key" onclick="handleKey('o')">O</button>
                    <button class="key" onclick="handleKey('p')">P</button>
                </div>
                <div class="keyboard-row">
                    <button class="key" onclick="handleKey('a')">A</button>
                    <button class="key" onclick="handleKey('s')">S</button>
                    <button class="key" onclick="handleKey('d')">D</button>
                    <button class="key" onclick="handleKey('f')">F</button>
                    <button class="key" onclick="handleKey('g')">G</button>
                    <button class="key" onclick="handleKey('h')">H</button>
                    <button class="key" onclick="handleKey('j')">J</button>
                    <button class="key" onclick="handleKey('k')">K</button>
                    <button class="key" onclick="handleKey('l')">L</button>
                </div>
                <div class="keyboard-row">
                    <button class="key wide" onclick="handleEnter()">ENTER</button>
                    <button class="key" onclick="handleKey('z')">Z</button>
                    <button class="key" onclick="handleKey('x')">X</button>
                    <button class="key" onclick="handleKey('c')">C</button>
                    <button class="key" onclick="handleKey('v')">V</button>
                    <button class="key" onclick="handleKey('b')">B</button>
                    <button class="key" onclick="handleKey('n')">N</button>
                    <button class="key" onclick="handleKey('m')">M</button>
                    <button class="key wide" onclick="handleBackspace()">⌫</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-overlay" id="dashboard-overlay">
        <div class="dashboard">
            <h2 class="dashboard-title">Select Level</h2>
            <div class="level-grid">
                <div class="level-option active" onclick="selectLevel('A1-A2')" id="level-a">
                    <div class="level-name">A1-A2</div>
                    <div class="level-desc">Basic</div>
                </div>
                <div class="level-option" onclick="selectLevel('A2-B1')" id="level-ab">
                    <div class="level-name">A2-B1</div>
                    <div class="level-desc">Pre-Intermediate</div>
                </div>
                <div class="level-option" onclick="selectLevel('B1-B2')" id="level-b">
                    <div class="level-name">B1-B2</div>
                    <div class="level-desc">Intermediate</div>
                </div>
                <div class="level-option" onclick="selectLevel('C1-C2')" id="level-c">
                    <div class="level-name">C1-C2</div>
                    <div class="level-desc">Advanced</div>
                </div>
                <div class="level-option wide" onclick="selectLevel('Random')" id="level-random">
                    <div class="level-name">Random</div>
                    <div class="level-desc">Any Level</div>
                </div>
            </div>
            <div class="dashboard-actions">
                <button class="dashboard-btn primary" onclick="applyLevelChange()">Apply</button>
                <button class="dashboard-btn secondary" onclick="closeDashboard()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="message" id="message"></div>
    <div class="tooltip" id="tooltip"></div>

    <div class="word-info-panel" id="word-info-panel">
        <div class="word-info-content">
            <div class="word-display" id="word-display"></div>
            <div class="word-arabic" id="word-arabic"></div>
            <div class="definition">
                <div class="definition-label">English Definition:</div>
                <div class="definition-text" id="definition-en"></div>
            </div>
            <div class="definition">
                <div class="definition-label">Arabic Definition:</div>
                <div class="definition-text" id="definition-ar"></div>
            </div>
            <div class="definition">
                <div class="definition-label">Repeatedness in Modern English:</div>
                <div class="definition-text" id="frequency"></div>
            </div>
            <button class="close-btn" onclick="closeWordInfo()">Continue</button>
        </div>
    </div>

    <script>
        // Game state
        let WORDS_DATA;
        let currentWord = '';
        let currentAttempt = 0;
        let currentGuess = '';
        let gameOver = false;
        let grid = [];
        let keyboardStates = {}; // Track keyboard letter states
        let selectedLevel = 'A1-A2';
        let tempSelectedLevel = 'A1-A2';
        let guessHistory = []; // Store all guesses with their words

        const levelToTier = {
            'A1-A2': 1,
            'A2-B1': 1.5,
            'B1-B2': 2,
            'C1-C2': 3
        };

        // Get words with definitions for the selected level
        function getWordsWithDefinitions(level = 'Random') {
            if (!WORDS_DATA) {
                console.error('WORDS_DATA is not loaded yet.');
                return [];
            }
            let words = Object.keys(WORDS_DATA).filter(word => 
                WORDS_DATA[word].en && WORDS_DATA[word].en.trim() !== ''
            );

            if (level !== 'Random') {
                const tier = levelToTier[level];
                words = words.filter(word => WORDS_DATA[word].tier === tier);
            }

            return words.length > 0 ? words : Object.keys(WORDS_DATA).filter(word => 
                WORDS_DATA[word].en && WORDS_DATA[word].en.trim() !== ''
            );
        }

        // Dashboard functions
        function showDashboard() {
            tempSelectedLevel = selectedLevel;
            updateLevelSelection();
            document.getElementById('dashboard-overlay').classList.add('show');
        }

        function closeDashboard() {
            document.getElementById('dashboard-overlay').classList.remove('show');
        }

        function selectLevel(level) {
            tempSelectedLevel = level;
            updateLevelSelection();
        }

        function updateLevelSelection() {
            // Remove active class from all options
            document.querySelectorAll('.level-option').forEach(option => {
                option.classList.remove('active');
            });

            // Add active class to selected option
            const levelMap = {
                'A1-A2': 'level-a',
                'A2-B1': 'level-ab',
                'B1-B2': 'level-b',
                'C1-C2': 'level-c',
                'Random': 'level-random'
            };

            const activeElement = document.getElementById(levelMap[tempSelectedLevel]);
            if (activeElement) {
                activeElement.classList.add('active');
            }
        }

        function applyLevelChange() {
            selectedLevel = tempSelectedLevel;
            document.getElementById('current-level').textContent = selectedLevel;
            closeDashboard();
            startNewGame();
        }

        // Initialize game
        function initGame() {
            if (!WORDS_DATA) {
                console.error('Cannot initialize game: WORDS_DATA is not loaded.');
                showMessage('Error: Word data not loaded. Please try again.');
                return;
            }
            createGrid();
            startNewGame();
            setupKeyboardListener();
        }

        function createGrid() {
            const gridElement = document.getElementById('grid');
            if (!gridElement) {
                console.error('Grid element not found in the DOM.');
                return;
            }
            gridElement.innerHTML = ''; // Clear existing grid
            grid = [];

            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.id = `row-${i}`;
                const rowData = [];

                // Add tooltip div for mobile
                const rowTooltip = document.createElement('div');
                rowTooltip.className = 'row-tooltip';
                rowTooltip.id = `tooltip-${i}`;
                row.appendChild(rowTooltip);

                for (let j = 0; j < 5; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${i}-${j}`;
                    
                    // Add tooltip functionality
                    if (window.innerWidth > 600) {
                        // Desktop: hover on row
                        cell.addEventListener('mouseenter', (e) => showTooltip(e, i));
                        cell.addEventListener('mouseleave', hideTooltip);
                    } else {
                        // Mobile: tap to show/hide
                        cell.addEventListener('click', (e) => toggleMobileTooltip(i));
                    }
                    
                    row.appendChild(cell);
                    rowData.push({ element: cell, letter: '', state: '' });
                }

                gridElement.appendChild(row);
                grid.push(rowData);
            }
            console.log('Grid created:', grid);
        }

        function startNewGame() {
            const wordsWithDef = getWordsWithDefinitions(selectedLevel);
            if (wordsWithDef.length === 0) {
                console.error('No valid words with definitions found.');
                showMessage('Error: No valid words available.');
                return;
            }
            currentWord = wordsWithDef[Math.floor(Math.random() * wordsWithDef.length)].toLowerCase();
            currentAttempt = 0;
            currentGuess = '';
            gameOver = false;
            keyboardStates = {};
            guessHistory = [];

            // Reset grid completely
            grid.forEach((row, rowIndex) => {
                row.forEach(cell => {
                    // Clear all content and classes
                    cell.element.innerHTML = '';
                    cell.element.textContent = '';
                    cell.element.className = 'cell';
                    cell.letter = '';
                    cell.state = '';
                });
                // Remove winning animation class and tooltips
                const rowElement = document.getElementById(`row-${rowIndex}`);
                rowElement.classList.remove('winning', 'show-tooltip');
                const tooltipElement = document.getElementById(`tooltip-${rowIndex}`);
                if (tooltipElement) {
                    tooltipElement.textContent = '';
                }
            });

            // Reset keyboard
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => {
                if (!key.classList.contains('wide')) {
                    key.className = 'key';
                } else {
                    key.className = 'key wide';
                }
            });

            // Hide any visible tooltips
            hideTooltip();
            hideAllMobileTooltips();

            updateAttemptDisplay();
            console.log('New word:', currentWord, 'Level:', selectedLevel);
        }

        function giveUp() {
            if (gameOver) return;
            
            gameOver = true;
            showMessage(`Game Over! The word was: ${currentWord.toUpperCase()}`);
            setTimeout(() => showWordInfo(), 2000);
        }

        function updateAttemptDisplay() {
            const attemptElement = document.getElementById('current-attempt');
            if (attemptElement) {
                attemptElement.textContent = currentAttempt + 1;
            } else {
                console.error('Current attempt element not found.');
            }
        }

        function handleKey(letter) {
            if (gameOver) return;
            if (currentGuess.length < 5) {
                currentGuess += letter.toLowerCase();
                updateCurrentRow();
            }
        }

        function handleBackspace() {
            if (gameOver) return;
            if (currentGuess.length > 0) {
                currentGuess = currentGuess.slice(0, -1);
                updateCurrentRow();
            }
        }

        function handleEnter() {
            if (gameOver) return;
            if (currentGuess.length !== 5) {
                showMessage('Word must be 5 letters long');
                return;
            }

            if (!WORDS_DATA.hasOwnProperty(currentGuess.toLowerCase())) {
                showMessage('Word not in word list');
                return;
            }

            checkGuess();
        }

        function updateCurrentRow() {
            if (currentAttempt >= grid.length) {
                console.error('Current attempt exceeds grid rows.');
                return;
            }
            const currentRow = grid[currentAttempt];
            for (let i = 0; i < 5; i++) {
                const letter = i < currentGuess.length ? currentGuess[i].toUpperCase() : '';
                currentRow[i].element.textContent = letter;
                currentRow[i].letter = i < currentGuess.length ? currentGuess[i] : '';
            }
        }

        function checkGuess() {
            const currentRow = grid[currentAttempt];
            const letterCount = {};
            
            // Count letters in the target word
            for (let letter of currentWord) {
                letterCount[letter] = (letterCount[letter] || 0) + 1;
            }

            const results = [];

            // First pass: mark correct positions
            for (let i = 0; i < 5; i++) {
                if (currentGuess[i] === currentWord[i]) {
                    results[i] = 'correct';
                    letterCount[currentGuess[i]]--;
                } else {
                    results[i] = null;
                }
            }

            // Second pass: mark present letters
            for (let i = 0; i < 5; i++) {
                if (results[i] === null) {
                    if (letterCount[currentGuess[i]] > 0) {
                        results[i] = 'present';
                        letterCount[currentGuess[i]]--;
                    } else {
                        results[i] = 'absent';
                    }
                }
            }

            // Store guess in history
            guessHistory[currentAttempt] = currentGuess;

            // Update tooltip for this row
            updateRowTooltip(currentAttempt, currentGuess);

            // Update keyboard for ALL letters in the guess
            for (let i = 0; i < 5; i++) {
                updateKeyboard(currentGuess[i], results[i]);
            }

            // Apply results with animation
            currentRow.forEach((cell, i) => {
                setTimeout(() => {
                    cell.element.classList.add('flip');
                    setTimeout(() => {
                        cell.element.classList.add(results[i]);
                        cell.state = results[i];
                        // CRITICAL: Ensure the letter stays visible after animation
                        cell.element.textContent = currentGuess[i].toUpperCase();
                        cell.letter = currentGuess[i];
                    }, 300);
                }, i * 100);
            });

            // Check win/lose condition
            setTimeout(() => {
                if (currentGuess === currentWord) {
                    gameOver = true;
                    // Add winning animation
                    document.getElementById(`row-${currentAttempt}`).classList.add('winning');
                    showMessage('Congratulations! You won! 🎉');
                    setTimeout(() => showWordInfo(), 2000);
                } else {
                    currentAttempt++;
                    if (currentAttempt >= 6) {
                        gameOver = true;
                        showMessage('Game Over! Better luck next time!');
                        setTimeout(() => showWordInfo(), 2000);
                    } else {
                        updateAttemptDisplay();
                    }
                }
                currentGuess = '';
            }, 600);
        }

        function updateKeyboard(letter, state) {
            const key = Array.from(document.querySelectorAll('.key')).find(k => 
                k.textContent.toLowerCase() === letter
            );
            
            if (key) {
                const currentState = keyboardStates[letter] || '';
                
                // State priority: correct > present > absent
                if (state === 'correct') {
                    // Always upgrade to correct (highest priority)
                    keyboardStates[letter] = 'correct';
                    key.className = key.classList.contains('wide') ? 'key wide correct' : 'key correct';
                } else if (state === 'present') {
                    // Only upgrade to present if not already correct
                    if (currentState !== 'correct') {
                        keyboardStates[letter] = 'present';
                        key.className = key.classList.contains('wide') ? 'key wide present' : 'key present';
                    }
                } else if (state === 'absent') {
                    // Only set absent if no previous state exists
                    if (!currentState) {
                        keyboardStates[letter] = 'absent';
                        key.className = key.classList.contains('wide') ? 'key wide absent' : 'key absent';
                    }
                }
            }
        }

        // Tooltip functions
        function showTooltip(event, rowIndex) {
            if (rowIndex >= guessHistory.length || !guessHistory[rowIndex]) return;
            
            const guessedWord = guessHistory[rowIndex];
            const wordData = WORDS_DATA[guessedWord];
            
            if (!wordData || !wordData.ar_word) return;
            
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = wordData.ar_word;
            
            // Position tooltip above the row center
            const rowElement = document.getElementById(`row-${rowIndex}`);
            const rect = rowElement.getBoundingClientRect();
            tooltip.style.left = `${rect.left + rect.width / 2}px`;
            tooltip.style.top = `${rect.top - 45}px`;
            tooltip.style.transform = 'translateX(-50%)';
            
            tooltip.classList.add('show');
        }

        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.classList.remove('show');
        }

        function updateRowTooltip(rowIndex, guessedWord) {
            const wordData = WORDS_DATA[guessedWord];
            const tooltipElement = document.getElementById(`tooltip-${rowIndex}`);
            
            if (tooltipElement && wordData && wordData.ar_word) {
                tooltipElement.textContent = wordData.ar_word;
            }
        }

        function toggleMobileTooltip(rowIndex) {
            if (rowIndex >= guessHistory.length || !guessHistory[rowIndex]) return;
            
            // Hide all other tooltips
            hideAllMobileTooltips();
            
            // Show this row's tooltip
            const rowElement = document.getElementById(`row-${rowIndex}`);
            rowElement.classList.add('show-tooltip');
            
            // Auto-hide after 3 seconds
            setTimeout(() => {
                rowElement.classList.remove('show-tooltip');
            }, 3000);
        }

        function hideAllMobileTooltips() {
            document.querySelectorAll('.row').forEach(row => {
                row.classList.remove('show-tooltip');
            });
        }

        function showMessage(text) {
            const messageEl = document.getElementById('message');
            if (messageEl) {
                messageEl.textContent = text;
                messageEl.classList.add('show');
                setTimeout(() => messageEl.classList.remove('show'), 2000);
            } else {
                console.error('Message element not found.');
            }
        }

        function showWordInfo() {
            const wordData = WORDS_DATA[currentWord];
            document.getElementById('word-display').textContent = currentWord.toUpperCase();
            document.getElementById('word-arabic').textContent = wordData.ar_word || 'غير متوفر';
            document.getElementById('definition-en').textContent = wordData.en || 'No definition available';
            document.getElementById('definition-ar').textContent = wordData.ar_def || 'غير متوفر تعريف';
            document.getElementById('frequency').textContent = `Frequency Score: ${wordData.signals ? wordData.signals.freq : 'N/A'}`;
            document.getElementById('word-info-panel').classList.add('show');
        }

        function closeWordInfo() {
            document.getElementById('word-info-panel').classList.remove('show');
        }

        function setupKeyboardListener() {
            document.addEventListener('keydown', (e) => {
                if (gameOver) return;

                if (e.key >= 'a' && e.key <= 'z') {
                    handleKey(e.key);
                } else if (e.key === 'Backspace') {
                    handleBackspace();
                } else if (e.key === 'Enter') {
                    handleEnter();
                }
            });
        }

        // Load words data and initialize the game
        // For demo purposes, let's create mock data
        const mockWordsData = {
            "hello": {
                "en": "A greeting or expression of goodwill",
                "ar_def": "تحية أو تعبير عن حسن النية",
                "ar_word": "مرحبا",
                "score": 0.8,
                "tier": 1,
                "signals": { "freq": 0.9, "wordnet": 1.0, "has_def": true }
            },
            "world": {
                "en": "The earth and all the people and things on it",
                "ar_def": "الأرض وجميع الناس والأشياء عليها",
                "ar_word": "عالم",
                "score": 0.7,
                "tier": 1,
                "signals": { "freq": 0.85, "wordnet": 1.0, "has_def": true }
            },
            "house": {
                "en": "A building for human habitation",
                "ar_def": "مبنى لسكن الإنسان",
                "ar_word": "منزل",
                "score": 0.75,
                "tier": 1,
                "signals": { "freq": 0.8, "wordnet": 1.0, "has_def": true }
            },
            "paper": {
                "en": "Material for writing or printing on",
                "ar_def": "مادة للكتابة أو الطباعة عليها",
                "ar_word": "ورقة",
                "score": 0.6,
                "tier": 1.5,
                "signals": { "freq": 0.7, "wordnet": 1.0, "has_def": true }
            },
            "light": {
                "en": "Natural illumination from the sun",
                "ar_def": "إضاءة طبيعية من الشمس",
                "ar_word": "ضوء",
                "score": 0.65,
                "tier": 1.5,
                "signals": { "freq": 0.75, "wordnet": 1.0, "has_def": true }
            },
            "write": {
                "en": "Mark letters or words on a surface",
                "ar_def": "وضع علامات أو كلمات على سطح",
                "ar_word": "كتب",
                "score": 0.5,
                "tier": 2,
                "signals": { "freq": 0.6, "wordnet": 1.0, "has_def": true }
            },
            "study": {
                "en": "Acquire knowledge through books",
                "ar_def": "اكتساب المعرفة من خلال الكتب",
                "ar_word": "دراسة",
                "score": 0.45,
                "tier": 2,
                "signals": { "freq": 0.55, "wordnet": 1.0, "has_def": true }
            },
            "great": {
                "en": "Of an extent or intensity considerably above average",
                "ar_def": "بمدى أو شدة أعلى بكثير من المتوسط",
                "ar_word": "عظيم",
                "score": 0.4,
                "tier": 3,
                "signals": { "freq": 0.5, "wordnet": 1.0, "has_def": true }
            },
            "magic": {
                "en": "Supernatural forces and events",
                "ar_def": "قوى وأحداث خارقة للطبيعة",
                "ar_word": "سحر",
                "score": 0.35,
                "tier": 3,
                "signals": { "freq": 0.45, "wordnet": 1.0, "has_def": true }
            }
        };

        // Use mock data or try to fetch real data
        fetch('./words.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load words.json');
                }
                return response.json();
            })
            .then(data => {
                WORDS_DATA = data;
                console.log('WORDS_DATA loaded:', WORDS_DATA);
                initGame();
            })
            .catch(error => {
                console.error('Error loading words:', error);
                console.log('Using mock data for demo');
                WORDS_DATA = mockWordsData;
                initGame();
            });
    </script>
</body>
